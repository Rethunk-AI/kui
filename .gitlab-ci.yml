# GitLab CI — mirrors .github/workflows/ci.yml
# Go version must match go.mod (see GO_VERSION below).

stages:
  - build
  - test
  - lint

variables:
  GO_VERSION: "1.25"

.build: &build
  image: golang:${GO_VERSION}
  before_script:
    - go version

build:
  <<: *build
  stage: build
  script:
    - go build ./...

test:
  <<: *build
  stage: test
  script:
    - go test ./...

vet:
  <<: *build
  stage: test
  script:
    - go vet ./...

lint:
  image: golang:${GO_VERSION}
  stage: lint
  before_script:
    - go version
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0
    - export PATH="$(go env GOPATH)/bin:$PATH"
  script:
    - golangci-lint run ./...

coverage:
  <<: *build
  stage: test
  script:
    - go test -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    when: always
    paths:
      - coverage.out
